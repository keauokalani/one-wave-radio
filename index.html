<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>One Wave Radio</title>

<style>

body{
background:#000;
color:#fff;
font-family:-apple-system,sans-serif;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.player{
position:relative;
width:520px;
border-radius:20px;
overflow:hidden;
box-shadow:0 5px 30px rgba(0,0,0,0.5);
background:#111;
}

.player img{
width:100%;
display:block;
}

.controls{
position:absolute;
bottom:0;
left:0;
right:0;
padding:15px;
background:rgba(0,0,0,0.65);
text-align:center;
}

button{
background:#00c853;
border:none;
padding:12px 20px;
margin:4px;
color:white;
font-weight:bold;
border-radius:20px;
cursor:pointer;
}

button:hover{
background:#00e676;
}

#volumeSlider{
width:200px;
margin-top:6px;
}

#status{
margin-bottom:8px;
font-size:14px;
}

</style>

</head>

<body>

<div class="player">

<img src="New ONE WAVE RADIO LOGO.png">

<div class="controls">

<div id="status">Ready to play</div>

<button id="playBtn">TUNE IN</button>

<div id="playerControls" style="display:none;">

<button id="playPauseBtn">PAUSE</button>
<button id="stopBtn">STOP</button>
<button id="skipBtn">SKIP</button>

<br>

<input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">

</div>

</div>

</div>

<audio id="player"></audio>

<script>

const bucketURL = "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev";

let tracks=[];
let shuffledTracks=[];
let currentTrackIndex=0;

const player=document.getElementById("player");
const playBtn=document.getElementById("playBtn");
const playPauseBtn=document.getElementById("playPauseBtn");
const stopBtn=document.getElementById("stopBtn");
const skipBtn=document.getElementById("skipBtn");
const volumeSlider=document.getElementById("volumeSlider");
const statusText=document.getElementById("status");
const playerControls=document.getElementById("playerControls");

function shuffleArray(arr){

let a=[...arr];

for(let i=a.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1));

[a[i],a[j]]=[a[j],a[i]];

}

return a;

}

async function fetchTracks(){

const response=await fetch(bucketURL);
const text=await response.text();

const parser=new DOMParser();
const xml=parser.parseFromString(text,"text/html");

const links=[...xml.querySelectorAll("a")];

tracks=[];

links.forEach(link=>{

if(link.href.endsWith(".mp3")){

const file=link.href.split("/").pop();

tracks.push({

url:bucketURL+"/"+file,
name:file

});

}

});

shuffledTracks=shuffleArray(tracks);

currentTrackIndex=0;

}

function playNext(){

if(currentTrackIndex>=shuffledTracks.length){

shuffledTracks=shuffleArray(tracks);
currentTrackIndex=0;

}

const track=shuffledTracks[currentTrackIndex];

currentTrackIndex++;

statusText.innerText="Now playing: "+track.name;

player.src=track.url;

player.play();

}

playBtn.onclick=async()=>{

await fetchTracks();

playNext();

playBtn.style.display="none";
playerControls.style.display="block";

};

playPauseBtn.onclick=()=>{

if(player.paused){

player.play();
playPauseBtn.innerText="PAUSE";

}else{

player.pause();
playPauseBtn.innerText="PLAY";

}

};

stopBtn.onclick=()=>{

player.pause();
player.currentTime=0;

};

skipBtn.onclick=()=>{

playNext();

};

volumeSlider.oninput=()=>{

player.volume=volumeSlider.value;

};

player.onended=()=>{

playNext();

};

</script>

</body>
</html>
