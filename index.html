<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Wave Radio</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:url("background.png") no-repeat center top fixed;
  background-size:cover;
  min-height:100vh;
  overflow:hidden;
}

.overlay{
  position:relative;
  min-height:100vh;
}

nav{
  position:absolute;
  top:52%;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:18px;
  justify-content:center;
  align-items:center;
  flex-wrap:nowrap;
}

nav a{
  color:white;
  text-decoration:none;
  font-size:18px;
  font-weight:bold;
  padding:10px 18px;
  border-radius:6px;
  background:rgba(0,0,0,0.45);
  display:inline-block;
  white-space:nowrap;
}

nav a:hover{
  background:#0ea5e9;
}

@media (max-width: 768px){
  nav{
    top:34%;
    gap:10px;
    flex-wrap:wrap;
    width:90%;
  }

  nav a{
    font-size:16px;
    padding:8px 14px;
  }
}
</style>

</head>

<body>

<div class="overlay">
  <nav>
    <a href="listen.html">Listen Live</a>
    <a href="news.html">News</a>
    <a href="weather.html">Weather</a>
    <a href="about.html">About</a>
  </nav>
</div>

</body>

</html>
