<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>One Wave Radio</title>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; user-select: none; }
        .player { position: relative; width: 380px; border-radius: 20px; overflow: hidden; box-shadow: 0 5px 30px rgba(0,0,0,0.5); background: #111; }
        .player-image-wrapper { position: relative; width: 100%; }
        .player-image-wrapper img { display: block; width: 100%; height: auto; }
        .controls-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px 20px 18px; display: flex; flex-direction: column; align-items: center; gap: 8px; background: rgba(255,255,255,0.85); }
        .live-tag { color: #00ff00; font-size: 11px; font-weight: 900; letter-spacing: 4px; margin-bottom: 2px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .dot { width: 8px; height: 8px; background: #00ff00; border-radius: 50%; box-shadow: 0 0 10px #00ff00; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        #status { font-size: 13px; color: #333; text-align: center; min-height: 18px; }
        #playBtn { background: #00c853; color: #fff; border: none; padding: 10px 40px; font-size: 16px; font-weight: bold; border-radius: 30px; cursor: pointer; letter-spacing: 2px; margin: 4px 0; }
        #playBtn:hover { background: #00e676; }
        #playerControls { display: none; flex-direction: column; align-items: center; gap: 6px; width: 100%; }
        #playerControls button { background: #333; color: #fff; border: none; padding: 8px 20px; font-size: 13px; border-radius: 20px; cursor: pointer; margin: 0 4px; }
        #playerControls button:hover { background: #555; }
        .btn-row { display: flex; gap: 10px; }
        #volumeSlider { width: 140px; accent-color: #00c853; }
        @media (max-width: 420px) { .player { width: 95vw; } }
    </style>
</head>
<body>
    <div class="player">
        <div class="player-image-wrapper">
            <img src="New%20ONE%20WAVE%20RADIO%20LOGO.png" alt="One Wave Radio 24/7 Original Music by D. Oliveira">
            <div class="controls-overlay">
                <div class="live-tag"><div class="dot"></div> LIVE 24/7</div>
                <div id="status">Ready to play</div>
                <button id="playBtn">TUNE IN</button>
                <div id="playerControls">
                    <div class="btn-row">
                        <button id="playPauseBtn">PAUSE</button>
                        <button id="stopBtn">STOP</button>
                    </div>
                    <div><input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.7"></div>
                </div>
            </div>
        </div>
        <audio id="radioPlayer"></audio>
    </div>
<script>
    // DISABLE RIGHT CLICK
    document.addEventListener('contextmenu', event => event.preventDefault());

    // HARDCODED SONGS (No Google Sheet delay!)
    const tracks = [
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/Country_living.mp3", name: "Country living" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/Po_mystic.mp3", name: "Po mystic" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/Mother_of_light.mp3", name: "Mother of light" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/Softly_loving_you.mp3", name: "Softly loving you" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/Softly_loving_you_main.mp3", name: "Softly loving you main" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/Softlylovingyou_megan_version.mp3", name: "Softlylovingyou megan version" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/Yahweh.m4a", name: "Yahweh" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/2000_futuristic_brandy.mp3", name: "2000 Futuristic Brandy" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/90s_classic_brandy.mp3", name: "90s Classic Brandy" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/Doing%20somethin%20right%20(Original%20Song).mp3", name: "Doing Somethin Right Original Song" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/Ka'u%20Coffee%20(Country%20Reggae).mp3", name: "Ka'u Coffee Country Reggae" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/Ka'u%20Coffee%20Jingle%20(Fast%20Country).mp3", name: "Ka'u Coffee Jingle Fast Country" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/Uptown_Jam.mp3", name: "Uptown Jam" },
        // Add more here later if needed
    ];

    const player = document.getElementById('radioPlayer');
    const btn = document.getElementById('playBtn');
    const statusText = document.getElementById('status');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const stopBtn = document.getElementById('stopBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const playerControls = document.getElementById('playerControls');
    
    let isPlaying = false;
    let shuffledTracks = [];
    let currentTrackIndex = 0;

    // Fisher-Yates shuffle algorithm
    function shuffleArray(arr) {
      const shuffled = arr.slice();
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    // Initialize shuffled playlist
    shuffledTracks = shuffleArray(tracks);
    function playNext() {
        if (tracks.length === 0) {
            statusText.innerText = "No songs found!";
            return;
        }

      // Get next track from shuffled playlist
      if (currentTrackIndex >= shuffledTracks.length) {
        shuffledTracks = shuffleArray(tracks);
        currentTrackIndex = 0;
      }
      const currentTrack = shuffledTracks[currentTrackIndex];
      currentTrackIndex++;        
        statusText.innerText = "Starting " + currentTrack.name + "...";
        
        // Reset player completely
        player.pause();
        player.src = "";
        
        // Set new source with cache buster
        const finalUrl = currentTrack.url + "?t=" + Date.now();
        player.src = finalUrl;
        
        // TRY TO PLAY IMMEDIATELY
        const playPromise = player.play();
        
        if (playPromise !== undefined) {
            playPromise.then(() => {
                // Success!
                statusText.innerHTML = "NOW PLAYING:<br><b style='color:#fff'>" + currentTrack.name + "</b>";
                updateUI(true);
            }).catch(error => {
                // Failed to play automatically
                console.error("Play failed:", error);
                statusText.innerText = "Click TUNE IN again to start.";
            });
        }
    }

    function updateUI(playing) {
        btn.style.display = "none";
        playerControls.style.display = "block";
        isPlaying = playing;
        playPauseBtn.textContent = playing ? "PAUSE" : "PLAY";
    }

    // THE BUTTON CLICK
    btn.onclick = () => {
        console.log("Button clicked!");
        shuffledTracks = shuffleArray(tracks);
        currentTrackIndex = 0;
        playNext();
    };

    playPauseBtn.onclick = () => {
        if (isPlaying) { player.pause(); updateUI(false); } 
        else { player.play(); updateUI(true); }
    };

    stopBtn.onclick = () => {
        player.pause(); 
        player.currentTime = 0; 
        updateUI(false);
        statusText.innerText = "Stopped.";
    };

    volumeSlider.oninput = () => { player.volume = volumeSlider.value; };
    player.onended = () => { playNext(); };
</script>
</body>
</html>
