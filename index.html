<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>One Wave Radio</title>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; user-select: none; }
        .player { position: relative; width: 520px; border-radius: 20px; overflow: hidden; box-shadow: 0 5px 30px rgba(0,0,0,0.5); background: #111; }
        .player-image-wrapper { position: relative; width: 100%; }
        .player-image-wrapper img { display: block; width: 100%; height: auto; }
        .controls-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px 20px 18px; display: flex; flex-direction: column; align-items: center; gap: 8px; background: rgba(255,255,255,0.85); }
        .live-tag { color: #00ff00; font-size: 14px; font-weight: 900; lettr-spacing: 4px; margin-bottom: 2px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .dot { width: 8px; height: 8px; background: #00ff00; border-radius:50%; box-shadow: 0 0 10px #00ff00; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        #status { font-size: 16px; color: #333; text-align: center; min-height: 18px; }
        #playBtn { background: #00c853; color: #fff; border: none; padding: 14px 50px; font-size: 20px; font-weight: bold; border-radius: 30px; cursor: pointer; letter-spacing: 2px; margin: 4px 0; }
        #playBtn:hover { background: #00e676; }
        #playerControls { display: none; flex-direction: column; align-items: center; gap: 6px; width: 100%; }
        #playerControls button { background: #333; color: #fff; border: none; padding: 10px 24px; font-size: 15px; border-radius: 20px; cursor: pointer; margin: 0 4px; }
        #playerControls button:hover { background: #555; }
                .btn-row { display: flex; gap: 10px; justify-content: center; }
        #volumeSlider { width: 200px; accent-color: #00c853; }
        @media (max-width: 540px) { .player { width: 95vw; } }
    </style>
</head>
<body>
    <div class="player">
        <div class="player-image-wrapper">
            <img src="New%20ONE%20WAVE%20RADIO%20LOGO.png" alt="One Wave Radio 24/7 Original Music by D. Oliveira">
            <div class="controls-overlay">
                <div class="live-tag"><div class="dot"></div> LIVE 24/7</div>
                <div id="status">Ready to play</div>
                <button id="playBtn">TUNE IN</button>
                <div id="playerControls">
                    <div class="btn-row">
                        <button id="playPauseBtn">PAUSE</button>
                        <button id="stopBtn">STOP</button>
                    </div>
                                    <div style="display: flex; justify-content: center;"><input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.7"></div>
                </div>
            </div>
        </div>
        <audio id="radioPlayer"></audio>
    </div>
<script>

    // HARDCODED SONGS (No Google Sheet delay!)

        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/Ka'u%20Coffee%20(Country%20Reggae).mp3", name: "Ka'u Coffee Country Reggae" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/Ka'u%20Coffee%20Jingle%20(Fast%20Country).mp3", name: "Ka'u Coffee Jingle Fast Country" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/Uptown_Jam.mp3", name: "Uptown Jam" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/Island_Bounce.mp3", name: "Island Bounce" },

        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/Island_soul_heavybass.mp3", name: "Island Soul Heavybass" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/Island_soul_onedrop.mp3", name: "Island Soul Onedrop" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/Island_sunset_instrumental.mp3", name: "Island Sunset Instrumental" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/Minimaldrill_trap.mp3", name: "Minimaldrill Trap" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/Nvr_say_goodbye_brandy.mp3", name: "Nvr Say Goodbye Brandy" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/Slowjamballad_brandy.mp3", name: "Slowjamballad Brandy" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/Spacetrap_futuristic.mp3", name: "Spacetrap Futuristic" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/UK_Lovers_Reggae.mp3", name: "UK Lovers Reggae" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/atmosphericdancehall_drake.mp3", name: "Atmosphericdancehall Drake" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/bell_noir.mp3", name: "Bell Noir" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/darklane_latenight_drake.mp3", name: "Darklane Latenight Drake" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/dubtouch_reggae.mp3", name: "Dubtouch Reggae" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/emotionalspace_piano_drake.mp3", name: "Emotionalspace Piano Drake" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/industrial_street.mp3", name: "Industrial Street" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/island_horizon.mp3", name: "Island Horizon" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/islandroots_reflections.mp3", name: "Islandroots Reflections" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/latenight_luxury_trap.mp3", name: "Latenight Luxury Trap" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/luxury_glossy_trap.mp3", name: "Luxury Glossy Trap" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/midnightdrift_drake.mp3", name: "Midnightdrift Drake" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/rnb_midtempo_brandy.mp3", name: "Rnb Midtempo Brandy" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/version_four_drake.mp3", name: "Version Four Drake" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/version_three_drake.mp3", name: "Version Three Drake" },
        { url: "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev/version_two_drake.mp3", name: "Version Two Drake" },
        // Add more here later if needed
    ];

    const player = document.getElementById('radioPlayer');
    const btn = document.getElementById('playBtn');
    const statusText = document.getElementById('status');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const stopBtn = document.getElementById('stopBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const playerControls = document.getElementById('playerControls');

    let isPlaying = false;
    let shuffledTracks = [];
    let currentTrackIndex = 0;

    // Station ID tracks
    const stationIDNames = [
        'ONE WAVE RADIO MAIN INTRO.mp3',
        'one_wave_radio_v2.mp3',
        'one_wave_radioSweep.mp3'
    ];

    const stationIDTracks = tracks.filter(t => {
        const fname = decodeURIComponent(t.url.split('/').pop());
        return stationIDNames.includes(fname);
    });
    const regularTracks = tracks.filter(t => {
        const fname = decodeURIComponent(t.url.split('/').pop());
        return !stationIDNames.includes(fname);
    });
    const introTrack = stationIDTracks.find(t => t.url.includes('ONE%20WAVE%20RADIO%20MAIN%20INTRO'));

    let isFirstPlay = true;
    let lastHourPlayed = -1;

    function shuffleArray(arr) {
        const shuffled = arr.slice();
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
    }

    shuffledTracks = shuffleArray(regularTracks);

    function shouldPlayStationID() {
        const currentHour = new Date().getHours();
        return currentHour !== lastHourPlayed;
    }

    function getRandomStationID() {
        const idx = Math.floor(Math.random() * stationIDTracks.length);
        return stationIDTracks[idx];
    }

    function playNext() {
        if (tracks.length === 0) {
            statusText.innerText = "No songs found!";
            return;
        }
        let currentTrack;
        if (isFirstPlay) {
            currentTrack = getRandomStationID();
            isFirstPlay = false;
            lastHourPlayed = new Date().getHours();
        } else if (shouldPlayStationID()) {
            currentTrack = getRandomStationID();
            lastHourPlayed = new Date().getHours();
        } else {
            if (currentTrackIndex >= shuffledTracks.length) {
                shuffledTracks = shuffleArray(regularTracks);
                currentTrackIndex = 0;
            }
            currentTrack = shuffledTracks[currentTrackIndex];
            currentTrackIndex++;
        }
        statusText.innerText = "Starting " + currentTrack.name + "...";
        player.pause();
        player.src = "";
        const finalUrl = currentTrack.url + "?t=" + Date.now();
        player.src = finalUrl;
        const playPromise = player.play();
        if (playPromise !== undefined) {
            playPromise.then(() => {
                statusText.innerHTML = "NOW PLAYING:<br><b style='color:#fff'>" + currentTrack.name + "</b>";
                updateUI(true);
            }).catch(error => {
                console.error("Play failed:", error);
                statusText.innerText = "Click TUNE IN again to start.";
            });
        }
    }

    function updateUI(playing) {
        btn.style.display = "none";
        playerControls.style.display = "flex";
        isPlaying = playing;
        playPauseBtn.textContent = playing ? "PAUSE" : "PLAY";
    }

    btn.onclick = () => {
        console.log("Button clicked!");
        isFirstPlay = true;
        lastHourPlayed = -1;
        shuffledTracks = shuffleArray(regularTracks);
        currentTrackIndex = 0;
        playNext();
    };

    playPauseBtn.onclick = () => {
        if (isPlaying) { player.pause(); updateUI(false); }
        else { player.play(); updateUI(true); }
    };

    stopBtn.onclick = () => {
        player.pause();
        player.currentTime = 0;
        updateUI(false);
        statusText.innerText = "Stopped.";
    };

    volumeSlider.oninput = () => { player.volume = volumeSlider.value; };
    player.onended = () => { playNext(); };
    </script>
</body>
</html>
