<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ONE WAVE RADIO</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background:#0a0a0a;
      font-family:'Courier New', monospace;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }

    .player-wrapper {
      position:relative;
      display:inline-block;
      overflow:hidden;
      max-width:100%;
    }

    .player-wrapper img {
      display:block;
      max-width:100%;
      height:auto;
      margin-bottom:-28%;
    }

    .controls-overlay {
      position:absolute;
      bottom:0;
      left:0;
      right:0;
      background:linear-gradient(transparent, rgba(0,0,0,0.85));
      padding:12px 15px 15px;
      text-align:center;
    }

    .status {
      color:#ccc;
      font-size:0.75em;
      margin-bottom:2px;
    }

    .now-playing {
      color:#fff;
      font-size:0.85em;
      margin-bottom:6px;
      min-height:1.2em;
    }

    .btn-row {
      margin-bottom:6px;
    }

    .btn-row button {
      background:rgba(255,255,255,0.2);
      color:#fff;
      border:1px solid rgba(255,255,255,0.4);
      padding:6px 16px;
      margin:0 3px;
      border-radius:5px;
      cursor:pointer;
      font-family:inherit;
      font-size:0.75em;
      font-weight:bold;
    }

    .btn-row button:hover {
      background:rgba(255,255,255,0.35);
    }

    .volume-row {
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      margin-bottom:6px;
    }

    .volume-row label {
      color:#ccc;
      font-size:0.7em;
    }

    .volume-row input[type=range] {
      width:100px;
      accent-color:#fff;
    }

    .tune-in-btn {
      background:#ff6600;
      color:#fff;
      border:none;
      padding:6px 24px;
      border-radius:20px;
      cursor:pointer;
      font-family:inherit;
      font-size:0.8em;
      font-weight:bold;
    }

    .tune-in-btn:hover {
      background:#ff8833;
    }
  </style>
</head>
<body>
  <div class="player-wrapper">
    <img src="New ONE WAVE RADIO LOGO.png" alt="ONE WAVE RADIO">

    <div class="controls-overlay">
      <div class="status" id="statusText">Click Tune In to start the broadcast</div>
      <div class="now-playing" id="nowPlaying"></div>

      <div class="btn-row" id="transportBtns" style="display:none;">
        <button id="playPauseBtn">PAUSE</button>
        <button id="stopBtn">STOP</button>
        <button id="skipBtn">SKIP</button>
      </div>

      <div class="volume-row">
        <label>Volume:</label>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
      </div>

      <button class="tune-in-btn" id="tuneInBtn">TUNE IN</button>
    </div>

    <audio id="player" crossorigin="anonymous"></audio>
  </div>

  <script>
    var bucketURL = "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev";

    /* REGULAR MUSIC PLAYLIST ONLY */
    var trackFiles = [
      "2000_futuristic_brandy.mp3",
      "90s_classic_brandy.mp3",
      "Country_Living.mp3",
      "Island_Bounce.mp3",
      "Island_Soul_Sunset_V2.mp3",
      "Island_soul_heavybass.mp3",
      "Island_soul_onedrop.mp3",
      "Island_sunset_instrumental.mp3",
      "Kaucoffee_islandreggae.mp3",
      "Minimaldrill_trap.mp3",
      "Nvr_say_goodbye_brandy.mp3",
      "Slowjamballad_brandy.mp3",
      "Spacetrap_futuristic.mp3",
      "UK_Lovers_Reggae.mp3",
      "atmosphericdancehall_drake.mp3",
      "bell_noir.mp3",
      "darklane_latenight_drake.mp3",
      "dubtouch_reggae.mp3",
      "emotionalspace_piano_drake.mp3",
      "industrial_street.mp3",
      "island_horizon.mp3",
      "islandroots_reflections.mp3",
      "kaucoffee_islandcountry.mp3",
      "latenight_luxury_trap.mp3",
      "luxury_glossy_trap.mp3",
      "midnightdrift_drake.mp3",
      "quiet_reflection.mp3",
      "rnb_midtempo_brandy.mp3",
      "version_four_drake.mp3",
      "version_three_drake.mp3",
      "version_two_drake.mp3",
      "Healing_Me.mp3",
      "Mother_of_light.mp3",
      "Softly_loving_you.mp3",
      "Softly_loving_you_main.mp3",
      "Softlylovingyou_megan_version.mp3",
      "Yahweh.mp3"
    ];

    /* STATION IDs ONLY */
    var stationIDs = [
      "OWR_MainStation_ID.mp3",
      "OneWaveRadio_Station_ID2.mp3",
      "OneWaveRadio_Station_ID3.mp3",
      "OneWaveRadio_Station_ID4.mp3"
    ];

    /*
      SPECIAL INSERTS
      To use them, type a filename inside these arrays.

      Example:
      var pendingNewsFiles = ["Kau_Newsupdate.mp3"];
      var pendingWeatherFiles = ["Kau_Weatherupdate.mp3"];
      var pendingEmergencyFiles = ["Kau_Emergencyalert.mp3"];

      Emergency alerts interrupt immediately.
      News and weather wait until the current song ends.
    */
    var pendingNewsFiles = ["Awakeningofman_Newsupdate.mp3";
    var pendingWeatherFiles = [];
    var pendingEmergencyFiles = [];

    var tracks = [];
    var remainingTracks = [];
    var pendingStationID = false;
    var lastHourTriggered = null;
    var isPlayingStationID = false;
    var isPlayingSpecialInsert = false;
    var isPlayingEmergency = false;
    var currentTrack = null;
    var interruptedTrack = null;
    var interruptedTime = 0;

    var player = document.getElementById("player");
    var volumeSlider = document.getElementById("volumeSlider");
    var statusText = document.getElementById("statusText");
    var nowPlaying = document.getElementById("nowPlaying");
    var transportBtns = document.getElementById("transportBtns");
    var tuneInBtn = document.getElementById("tuneInBtn");
    var playPauseBtn = document.getElementById("playPauseBtn");
    var stopBtn = document.getElementById("stopBtn");
    var skipBtn = document.getElementById("skipBtn");

    function shuffleArray(a) {
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = a[i];
        a[i] = a[j];
        a[j] = t;
      }
      return a;
    }

    function buildTrackObjects(files) {
      return files.map(function(f) {
        return {
          file: f,
          title: f.replace(/_/g, " ").replace(/\.mp3$/i, ""),
          url: bucketURL + "/" + encodeURIComponent(f),
          type: "music"
        };
      });
    }

    function buildSpecialObject(fileName, typeLabel) {
      return {
        file: fileName,
        title: fileName.replace(/_/g, " ").replace(/\.mp3$/i, ""),
        url: bucketURL + "/" + encodeURIComponent(fileName),
        type: typeLabel
      };
    }

    function refillQueue() {
      remainingTracks = shuffleArray(tracks.slice());
      console.log("New shuffle cycle:", remainingTracks.map(function(t) { return t.title; }));
    }

    function fetchTracks() {
      tracks = buildTrackObjects(trackFiles);
      refillQueue();
      statusText.textContent = "Ready - " + tracks.length + " tracks loaded";
    }

    function updateStatusForCurrentType() {
      if (isPlayingEmergency) {
        statusText.textContent = "Emergency Alert";
      } else if (isPlayingStationID) {
        statusText.textContent = "Station Identification";
      } else if (isPlayingSpecialInsert && currentTrack && currentTrack.type === "news") {
        statusText.textContent = "News Update";
      } else if (isPlayingSpecialInsert && currentTrack && currentTrack.type === "weather") {
        statusText.textContent = "Weather Update";
      } else {
        statusText.textContent = "Live now";
      }
    }

    function startTrack(trackObj) {
      currentTrack = trackObj;

      player.pause();
      player.currentTime = 0;
      player.src = trackObj.url;

      nowPlaying.textContent = "Now playing: " + trackObj.title;
      transportBtns.style.display = "block";
      tuneInBtn.style.display = "none";
      statusText.textContent = "Loading broadcast...";

      player.play().then(function() {
        playPauseBtn.textContent = "PAUSE";
        updateStatusForCurrentType();
      }).catch(function(err) {
        console.error("Playback error:", err, trackObj.file);
        statusText.textContent = "Playback failed, skipping...";

        if (isPlayingEmergency) {
          isPlayingEmergency = false;
          resumeInterruptedTrack();
          return;
        }

        if (isPlayingStationID) {
          isPlayingStationID = false;
        }

        if (isPlayingSpecialInsert) {
          isPlayingSpecialInsert = false;
        }

        currentTrack = null;
        setTimeout(playNext, 500);
      });
    }

    function playMusicTrack(trackObj) {
      isPlayingStationID = false;
      isPlayingSpecialInsert = false;
      isPlayingEmergency = false;
      startTrack(trackObj);
    }

    function playStationID() {
      var idFile = stationIDs[Math.floor(Math.random() * stationIDs.length)];
      isPlayingStationID = true;
      isPlayingSpecialInsert = false;
      isPlayingEmergency = false;
      startTrack(buildSpecialObject(idFile, "stationID"));
    }

    function playEmergencyNow() {
      if (pendingEmergencyFiles.length === 0) return;
      if (isPlayingEmergency) return;

      var emergencyFile = pendingEmergencyFiles.shift();

      if (!player.paused && currentTrack && currentTrack.type === "music") {
        interruptedTrack = currentTrack;
        interruptedTime = player.currentTime || 0;
      } else {
        interruptedTrack = null;
        interruptedTime = 0;
      }

      isPlayingEmergency = true;
      isPlayingStationID = false;
      isPlayingSpecialInsert = false;

      startTrack(buildSpecialObject(emergencyFile, "emergency"));
    }

    function resumeInterruptedTrack() {
      if (!interruptedTrack) {
        playNext();
        return;
      }

      var trackToResume = interruptedTrack;
      var timeToResume = interruptedTime || 0;

      interruptedTrack = null;
      interruptedTime = 0;
      isPlayingEmergency = false;
      isPlayingStationID = false;
      isPlayingSpecialInsert = false;
      currentTrack = trackToResume;

      player.pause();
      player.src = trackToResume.url;
      nowPlaying.textContent = "Now playing: " + trackToResume.title;
      statusText.textContent = "Resuming broadcast...";

      player.onloadedmetadata = function() {
        player.onloadedmetadata = null;

        try {
          player.currentTime = timeToResume;
        } catch (e) {
          console.warn("Resume time failed:", e);
        }

        player.play().then(function() {
          playPauseBtn.textContent = "PAUSE";
          statusText.textContent = "Live now";
        }).catch(function(err) {
          console.error("Resume failed:", err);
          currentTrack = null;
          playNext();
        });
      };
    }

    function playNext() {
      if (pendingEmergencyFiles.length > 0) {
        playEmergencyNow();
        return;
      }

      if (pendingNewsFiles.length > 0) {
        var newsFile = pendingNewsFiles.shift();
        isPlayingSpecialInsert = true;
        isPlayingStationID = false;
        isPlayingEmergency = false;
        startTrack(buildSpecialObject(newsFile, "news"));
        return;
      }

      if (pendingWeatherFiles.length > 0) {
        var weatherFile = pendingWeatherFiles.shift();
        isPlayingSpecialInsert = true;
        isPlayingStationID = false;
        isPlayingEmergency = false;
        startTrack(buildSpecialObject(weatherFile, "weather"));
        return;
      }

      if (pendingStationID) {
        pendingStationID = false;
        playStationID();
        return;
      }

      if (remainingTracks.length === 0) {
        refillQueue();
      }

      var nextTrack = remainingTracks.shift();
      playMusicTrack(nextTrack);
    }

    fetchTracks();
    player.volume = 0.7;

    tuneInBtn.onclick = function() {
      playNext();
    };

    playPauseBtn.onclick = function() {
      if (player.paused) {
        player.play().then(function() {
          playPauseBtn.textContent = "PAUSE";
          updateStatusForCurrentType();
        }).catch(function(err) {
          console.error("Resume error:", err);
        });
      } else {
        player.pause();
        playPauseBtn.textContent = "PLAY";
        statusText.textContent = "Paused";
      }
    };

    stopBtn.onclick = function() {
      player.pause();
      player.removeAttribute("src");
      player.load();

      nowPlaying.textContent = "";
      statusText.textContent = "Stopped";
      playPauseBtn.textContent = "PLAY";
      transportBtns.style.display = "none";
      tuneInBtn.style.display = "inline-block";

      currentTrack = null;
      interruptedTrack = null;
      interruptedTime = 0;
      isPlayingStationID = false;
      isPlayingSpecialInsert = false;
      isPlayingEmergency = false;
      pendingStationID = false;
    };

    skipBtn.onclick = function() {
      if (isPlayingEmergency) {
        isPlayingEmergency = false;
        interruptedTrack = null;
        interruptedTime = 0;
      }

      if (isPlayingStationID) {
        isPlayingStationID = false;
      }

      if (isPlayingSpecialInsert) {
        isPlayingSpecialInsert = false;
      }

      currentTrack = null;
      playNext();
    };

    volumeSlider.oninput = function() {
      player.volume = parseFloat(this.value);
    };

    player.onended = function() {
      if (isPlayingEmergency) {
        isPlayingEmergency = false;
        resumeInterruptedTrack();
      } else if (isPlayingStationID) {
        isPlayingStationID = false;
        playNext();
      } else if (isPlayingSpecialInsert) {
        isPlayingSpecialInsert = false;
        playNext();
      } else {
        playNext();
      }
    };

    player.onerror = function() {
      console.error("Track load error:", player.src);
      statusText.textContent = "Track failed, skipping...";

      if (isPlayingEmergency) {
        isPlayingEmergency = false;
        resumeInterruptedTrack();
        return;
      }

      if (isPlayingStationID) {
        isPlayingStationID = false;
      }

      if (isPlayingSpecialInsert) {
        isPlayingSpecialInsert = false;
      }

      currentTrack = null;
      setTimeout(playNext, 500);
    };

    player.onwaiting = function() {
      statusText.textContent = "Buffering...";
    };

    player.onplaying = function() {
      updateStatusForCurrentType();
    };

    setInterval(function() {
      var now = new Date();
      var minute = now.getMinutes();
      var hour = now.getHours();

      if (minute === 0 && lastHourTriggered !== hour) {
        lastHourTriggered = hour;
        pendingStationID = true;
        console.log("Top of the hour reached. Station ID queued.");
      }
    }, 10000);

    /*
      OPTIONAL HELPERS
      You can use these if you ever want to trigger files in the code:
      queueNews("Kau_Newsupdate.mp3");
      queueWeather("Kau_Weatherupdate.mp3");
      queueEmergency("Kau_Emergencyalert.mp3");
    */
    function queueNews(fileName) {
      pendingNewsFiles.push(fileName);
    }

    function queueWeather(fileName) {
      pendingWeatherFiles.push(fileName);
    }

    function queueEmergency(fileName) {
      pendingEmergencyFiles.push(fileName);
      playEmergencyNow();
    }
  </script>
</body>
</html>
