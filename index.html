<!DOCTYPE html>
<html lang='en'>
  <head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>ONE WAVE RADIO</title>
  <style>
    body{margin:0;padding:0;background:#0a0a0a;color:#00ff88;font-family:'Courier New',monospace;display:flex;justify-content:center;align-items:center;min-height:100vh;}
    .player-container{text-align:center;padding:40px;border:2px solid #00ff88;border-radius:15px;background:rgba(0,255,136,0.05);max-width:500px;width:90%;}
    h1{font-size:2em;margin-bottom:10px;text-shadow:0 0 20px #00ff88;}
    .status{color:#00cc66;margin:15px 0;font-size:0.9em;}
    .now-playing{color:#ffffff;margin:20px 0;font-size:1.1em;min-height:1.5em;}
    button{background:#00ff88;color:#0a0a0a;border:none;padding:12px 30px;margin:5px;border-radius:8px;cursor:pointer;font-family:'Courier New',monospace;font-weight:bold;font-size:1em;}
    button:hover{background:#00cc66;}
    .controls{margin-top:20px;}
    .volume-control{margin-top:15px;}
    input[type='range']{width:200px;accent-color:#00ff88;}
    #playBtn{font-size:1.2em;padding:15px 50px;}
    #playerControls{display:none;}
    </style>
  </head>
  <body>
    <div class='player-container'>
      <h1>ONE WAVE RADIO</h1>
    <p class='status' id='statusText'>Click play to start the broadcast</p>p>
    <p class='now-playing' id='nowPlaying'></p>p>
    <button id='playBtn'>PLAY</button>button>
    <audio id='player' crossorigin='anonymous'></audio>audio>
    <div id='playerControls'>
    <div class='controls'>
    <button id='playPauseBtn'>PAUSE</button>button>
    <button id='stopBtn'>STOP</button>button>
    <button id='skipBtn'>SKIP</button>button>
    </div>div>
    <div class='volume-control'>
    <label>Volume: </label>
    <input type='range' id='volumeSlider' min='0' max='1' step='0.01' value='0.7'>
    </div>div>
    </div>div>
    </div>div>
  <script>
    var bucketURL='https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev';
    var tracks=[],shuffledTracks=[],currentTrackIndex=0;
    var player=document.getElementById('player');
    var playBtn=document.getElementById('playBtn');
    var playPauseBtn=document.getElementById('playPauseBtn');
    var stopBtn=document.getElementById('stopBtn');
    var skipBtn=document.getElementById('skipBtn');
    var volumeSlider=document.getElementById('volumeSlider');
    var statusText=document.getElementById('statusText');
    var nowPlaying=document.getElementById('nowPlaying');
    var playerControls=document.getElementById('playerControls');
    player.volume=0.7;

    // Hardcoded track list from Cloudflare R2 bucket (fix for missing playlist JSON)
    var trackFiles=[
      '2000_futuristic_brandy.mp3',
      '90s_classic_brandy.mp3',
      'Country_Living.mp3',
      'Island_Bounce.mp3',
      'Island_Soul_Sunset_V2.mp3',
      'Island_soul_heavybass.mp3',
      'Island_soul_onedrop.mp3',
      'Island_sunset_instrumental.mp3',
      'Kaucoffee_islandreggae.mp3',
      'Minimaldrill_trap.mp3',
      'Nvr_say_goodbye_brandy.mp3',
      'OWR_MainStation_ID.mp3',
      'OneWaveRadio_Station_ID2.mp3',
      'OneWaveRadio_Station_ID3.mp3',
      'OneWaveRadio_Station_ID4.mp3',
      'Slowjamballad_brandy.mp3',
      'Spacetrap_futuristic.mp3',
      'TueMar10_News.mp3',
      'UK_Lovers_Reggae.mp3',
      'atmosphericdancehall_drake.mp3',
      'bell_noir.mp3',
      'darklane_latenight_drake.mp3',
      'dubtouch_reggae.mp3',
      'emotionalspace_piano_drake.mp3',
      'industrial_street.mp3',
      'island_horizon.mp3',
      'islandroots_reflections.mp3',
      'kaucoffee_islandcountry.mp3',
      'latenight_luxury_trap.mp3',
      'luxury_glossy_trap.mp3',
      'midnightdrift_drake.mp3',
      'quiet_reflection.mp3',
      'rnb_midtempo_brandy.mp3',
      'version_four_drake.mp3',
      'version_three_drake.mp3',
      'version_two_drake.mp3'
      ];

    function shuffleArray(arr){
      var a=arr.slice();
      for(var i=a.length-1;i>0;i--){
        var j=Math.floor(Math.random()*(i+1));
        var t=a[i];a[i]=a[j];a[j]=t;
      }
      return a;
    }

    // Build tracks from hardcoded file list
    async function fetchTracks(){
      tracks=[];
      for(var i=0;i<trackFiles.length;i++){
        var f=trackFiles[i];
        var name=f.replace(/_/g,' ').replace('.mp3','');
        tracks.push({name:name,url:bucketURL+'/'+encodeURIComponent(f)});
      }
      if(tracks.length>0){
        statusText.innerText='Loaded '+tracks.length+' tracks';
        shuffledTracks=shuffleArray(tracks);
        currentTrackIndex=0;
      }else{
        statusText.innerText='Error: No tracks available';
      }
    }

    // Auto-advance to next song
    function playNext(){
      if(currentTrackIndex>=shuffledTracks.length){
        shuffledTracks=shuffleArray(tracks);currentTrackIndex=0;
      }
      var track=shuffledTracks[currentTrackIndex];
      currentTrackIndex++;
      statusText.innerText='Now playing: '+track.name;
      nowPlaying.innerText=track.name;
      player.src=track.url;
      player.play();
    }

    playBtn.onclick=async function(){
      await fetchTracks();
      playNext();
      playBtn.style.display='none';
      playerControls.style.display='block';
    };

    playPauseBtn.onclick=function(){
      if(player.paused){player.play();playPauseBtn.innerText='PAUSE';}
      else{player.pause();playPauseBtn.innerText='PLAY';}
    };

    stopBtn.onclick=function(){player.pause();player.currentTime=0;};
    skipBtn.onclick=function(){playNext();};
    volumeSlider.oninput=function(){player.volume=volumeSlider.value;};

    // Auto-advance to next song when current ends
    player.onended=function(){playNext();};
  </script>
  </body>
</html>html>
  </script></label></h1>
  </body>
  </style></title>
