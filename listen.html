<section id="player-section">
<h2>Listen Live</h2>
<audio id="player" crossorigin="anonymous" controls></audio>
<br><br>
<button id="playBtn" onclick="playNext()">&#9654; Play</button>
<p id="trackTitle">Loading...</p>
<p>Broadcasting 24/7</p>
</section>
<script>
var bucketURL = "https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev";
var playlist = [
"2000_futuristic_brandy.mp3",
"90s_classic_brandy.mp3",
"90s_hit_de_oliveira.mp3",
"90s_rnb_de_oliveira.mp3",
"aloha_Friday_de_oliveira.mp3",
"big_island_beauty_de_oliveira.mp3",
"blue_hawaii_de_oliveira.mp3",
"breakbeat_de_oliveira.mp3",
"classical_de_oliveira.mp3",
"de_oliveira_90s_slow_jam.mp3",
"hilo_town_de_oliveira.mp3",
"island_reggae_de_oliveira.mp3",
"jazz_de_oliveira.mp3",
"latin_de_oliveira.mp3",
"mele_kalikimaka_de_oliveira.mp3",
"ocean_breeze_de_oliveira.mp3",
"puna_de_oliveira.mp3",
"soul_de_oliveira.mp3",
"ukulele_de_oliveira.mp3",
"vintage_de_oliveira.mp3",
"volcano_de_oliveira.mp3"
];
var player = document.getElementById("player");
var trackTitle = document.getElementById("trackTitle");
var currentIndex = 0;
function buildTrackObjects(files) {
return files.map(function(f) {
return {
file: f,
title: f.replace(/_/g, " ").replace(/\.mp3$/i, ""),
url: bucketURL + "/" + encodeURIComponent(f),
type: "music"
};
});
}
var tracks = buildTrackObjects(playlist);
function shuffle(arr) {
for (var i = arr.length - 1; i > 0; i--) {
var j = Math.floor(Math.random() * (i + 1));
var temp = arr[i]; arr[i] = arr[j]; arr[j] = temp;
}
return arr;
}
shuffle(tracks);
function startTrack(index) {
if (index >= tracks.length) { shuffle(tracks); index = 0; }
currentIndex = index;
var t = tracks[index];
trackTitle.textContent = "Now Playing: " + t.title;
player.src = t.url;
player.play().catch(function(e) { console.log("Playback error:", e); });
}
player.addEventListener("ended", function() { startTrack(currentIndex + 1); });
function playNext() {
startTrack(currentIndex);
}
</script>
</body>
