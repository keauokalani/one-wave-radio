name: Update Playlist from Cloudflare R2

on:
  schedule:
      # Run every 30 minutes
          - cron: '*/30 * * * *'
  workflow_dispatch:

            jobs:
              update-playlist:
                  runs-on: ubuntu-latest

                      env:
                            R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
                                  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
                                        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
                                              R2_BUCKET_NAME: my-radio-station
                                                    R2_PUBLIC_URL: https://pub-2aa01387a331477abb91b2bed61747b9.r2.dev

                                                        steps:
                                                              - name: Checkout repository
                                                                      uses: actions/checkout@v4

                                                                            - name: Install rclone
                                                                                    run: |
                                                                                              curl -fsSL https://rclone.org/install.sh | sudo bash

                                                                                                    - name: Configure rclone for Cloudflare R2
                                                                                                            run: |
                                                                                                                      mkdir -p ~/.config/rclone
                                                                                                                                cat > ~/.config/rclone/rclone.conf << EOF
                                                                                                                                          [r2]
                                                                                                                                                    type = s3
                                                                                                                                                              provider = Cloudflare
                                                                                                                                                                        access_key_id = ${R2_ACCESS_KEY_ID}
                                                                                                                                                                                  secret_access_key = ${R2_SECRET_ACCESS_KEY}
                                                                                                                                                                                            endpoint = https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com
                                                                                                                                                                                                      acl = private
                                                                                                                                                                                                                no_check_bucket = true
                                                                                                                                                                                                                          EOF
                                                                                                                                                                                                                          
                                                                                                                                                                                                                                - name: List R2 bucket files
                                                                                                                                                                                                                                        run: |
                                                                                                                                                                                                                                                  echo "Listing files in R2 bucket..."
                                                                                                                                                                                                                                                            rclone ls r2:${R2_BUCKET_NAME}/ --include "*.mp3" | awk '{print $2}' | sort > r2_files.txt
                                                                                                                                                                                                                                                                      echo "Files found in R2:"
                                                                                                                                                                                                                                                                                cat r2_files.txt
                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                      - name: Generate updated index.html playlist
                                                                                                                                                                                                                                                                                              run: |
                                                                                                                                                                                                                                                                                                        echo "Generating updated playlist..."
                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                            # Read current index.html to preserve the HTML structure
                                                                                                                                                                                                                                                                                                                                      if [ ! -f index.html ]; then
                                                                                                                                                                                                                                                                                                                                                  echo "ERROR: index.html not found!"
                                                                                                                                                                                                                                                                                                                                                              exit 1
                                                                                                                                                                                                                                                                                                                                                                        fi
                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                            # Build new tracks array from R2 file list
                                                                                                                                                                                                                                                                                                                                                                                                      TRACKS=""
                                                                                                                                                                                                                                                                                                                                                                                                                STATION_IDS=""
                                                                                                                                                                                                                                                                                                                                                                                                                          while IFS= read -r file; do
                                                                                                                                                                                                                                                                                                                                                                                                                                      # Skip empty lines
                                                                                                                                                                                                                                                                                                                                                                                                                                                  [ -z "$file" ] && continue
                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                          # Create display name from filename (remove .mp3, replace underscores)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      display_name=$(echo "$file" | sed 's/\.mp3$//' | sed 's/_/ /g')
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              # Separate station IDs from regular tracks
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          if echo "$file" | grep -qi "Station_ID\|MainStation"; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        STATION_IDS="${STATION_IDS}    { url: \"${R2_PUBLIC_URL}/${file}\", name: \"${display_name}\" },\n"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  TRACKS="${TRACKS}    { url: \"${R2_PUBLIC_URL}/${file}\", name: \"${display_name}\" },\n"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        done < r2_files.txt
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            # Use python to safely update the tracks array in index.html
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      python3 << 'PYEOF'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                import re, os
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    r2_url = os.environ.get("R2_PUBLIC_URL", "")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        with open("r2_files.txt") as f:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      files = [line.strip() for line in f if line.strip()]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          tracks = []
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    station_ids = []
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              for fn in files:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            display = fn.replace(".mp3", "").replace("_", " ")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          entry = f'    {{ url: "{r2_url}/{fn}", name: "{display}" }}'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if "Station_ID" in fn or "MainStation" in fn:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          station_ids.append(entry)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        else:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          tracks.append(entry)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              with open("index.html") as f:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            html = f.read()
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                # Replace tracks array
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          tracks_str = ",\n".join(tracks)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    html = re.sub(
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  r'(const tracks = \[)\s*\n.*?(\n\s*\];)',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                f'\\1\n{tracks_str}\n  \\2',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              html,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            flags=re.DOTALL,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          count=1
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    )
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        # Replace station ID tracks array
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  if station_ids:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                sids_str = ", ".join(station_ids)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              html = re.sub(
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                r'(const stationIDTracks = \[).*?(\];)',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  f'\\1{sids_str}\\2',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    html,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      flags=re.DOTALL,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        count=1
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      )
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          with open("index.html", "w") as f:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        f.write(html)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            print(f"Updated playlist: {len(tracks)} tracks, {len(station_ids)} station IDs")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      PYEOF
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - name: Check for changes
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    id: changes
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      git diff --quiet index.html && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - name: Commit and push changes
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if: steps.changes.outputs.changed == 'true'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      git config user.name "github-actions[bot]"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                git config user.email "github-actions[bot]@users.noreply.github.com"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          git add index.html
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    TRACK_COUNT=$(grep -c 'url:' index.html || true)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              git commit -m "Auto-update playlist from R2 - ${TRACK_COUNT} tracks"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        git push
